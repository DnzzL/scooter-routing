<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ScooterRoute — Itinéraire scooter & voiture sans permis</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
    --void: #0e1012;
    --deep: #15171b;
    --gunmetal: #1c1f24;
    --graphite: #23262d;
    --steel: #4a5463;
    --pewter: #5c6880;
    --slate: #7b8699;
    --ash: #8b96aa;
    --fog: #a0aaba;
    --silver: #bbc2ce;
    --cloud: #d5dae2;
    --white: #ffffff;
    --blue: #007afc;
    --blue-deep: #0062ca;
    --green: #228a56;
    --radius-pill: 100px;
    --radius-card: 24px;
    --radius-chip: 12px;
    --radius-badge: 4px;
    --radius-input: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 2px;
}
body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; height: 100vh; overflow: hidden;
    background: var(--void); color: var(--fog); -webkit-font-smoothing: antialiased;
}

/* ---- Sidebar ---- */
#sidebar {
    width: 400px; min-width: 400px;
    display: flex; flex-direction: column;
    background: var(--deep);
    z-index: 1000; overflow-y: auto;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: var(--void); }
#sidebar::-webkit-scrollbar-thumb { background: var(--steel); border-radius: var(--radius-badge); }

/* ---- Header ---- */
#sidebar-header {
    padding: 28px 24px 16px;
    display: flex; align-items: center; gap: 14px;
}
    .logo-mark {
        width: 36px; height: 36px; flex-shrink: 0;
        background: var(--blue); border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; line-height: 1;
    }
    #sidebar-header h1 {
        font-size: 20px; font-weight: 700; color: var(--white);
        letter-spacing: -0.4px; line-height: 1.25;
    }
    #sidebar-header .subtitle {
        font-size: 13px; color: var(--ash); font-weight: 400;
        letter-spacing: 0.2px; margin-top: 1px;
    }

/* ---- Form ---- */
#route-form { padding: 8px 24px 16px; }
.form-group { margin-bottom: 10px; position: relative; }
.form-group label {
    display: block; font-size: 11px; color: var(--slate);
    text-transform: uppercase; letter-spacing: 0.7px;
    margin-bottom: 5px; font-weight: 500;
}
.form-group input {
    width: 100%; padding: 10px 14px 10px 36px;
    border: 1px solid var(--gunmetal); border-radius: var(--radius-input);
    background: var(--void); color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 400;
    outline: none; transition: border-color 0.15s;
}
.form-group input:focus { border-color: var(--blue); }
.form-group input::placeholder { color: var(--steel); font-weight: 400; }
.form-group .input-icon {
    position: absolute; left: 11px; bottom: 11px;
    font-size: 13px; pointer-events: none;
    color: var(--slate);
}

/* ---- Vehicle toggle ---- */
.vehicle-bar {
    display: flex; gap: 0; margin-bottom: 14px;
    background: var(--void); border-radius: var(--radius-pill);
    padding: 3px; border: 1px solid var(--gunmetal);
}
.vehicle-btn {
    flex: 1; padding: 7px 14px;
    border: none; border-radius: var(--radius-pill);
    background: transparent; color: var(--slate);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; text-align: center; transition: all 0.15s;
}
.vehicle-btn.active {
    background: var(--blue); color: var(--white); font-weight: 500;
}

/* ---- CTA ---- */
#route-btn {
    width: 100%; padding: 12px 24px;
    border: none; border-radius: var(--radius-pill);
    background: var(--blue); color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; margin-top: 2px;
    letter-spacing: 0.2px; transition: opacity 0.15s;
}
#route-btn:hover { opacity: 0.9; }
#route-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ---- Separator ---- */
.separator { height: 1px; background: var(--gunmetal); margin: 0 24px; }

/* ---- Route Result ---- */
#route-result { flex: 1; padding: 16px 24px 24px; }
.route-stats {
    display: flex; gap: 8px; margin-bottom: 14px;
}
.route-stat {
    flex: 1; text-align: center;
    background: var(--void); border-radius: var(--radius-card);
    padding: 14px 8px;
}
.route-stat .value {
    font-size: 28px; font-weight: 700; color: var(--white);
    letter-spacing: -0.56px; line-height: 1;
}
.route-stat .value.blue { color: var(--blue); }
.route-stat .value.green { color: var(--green); }
.route-stat .label {
    font-size: 10px; color: var(--slate);
    text-transform: uppercase; letter-spacing: 0.7px; margin-top: 4px;
    font-weight: 500;
}
.route-detail {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--ash); padding: 0 4px;
    margin-bottom: 14px;
}
.route-detail span:last-child { color: var(--fog); font-weight: 500; }
.route-footer {
    text-align: center; font-size: 11px; color: var(--steel);
}
.route-footer a { color: var(--blue); text-decoration: none; }
.route-footer a:hover { text-decoration: underline; }

/* ---- Alert ---- */
.alert {
    padding: 10px 14px; border-radius: var(--radius-chip);
    font-size: 13px; margin-bottom: 8px;
    background: var(--void); border: 1px solid var(--gunmetal); color: var(--ash);
}

/* ---- Map ---- */
#map { flex: 1; height: 100vh; z-index: 0; position: relative; }
#map::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; z-index: 500;
    height: 175px;
    background: linear-gradient(0deg, var(--void), transparent);
    pointer-events: none;
}

/* ---- Map Legend ---- */
#map-legend {
    position: absolute; bottom: 24px; right: 16px; z-index: 1000;
    background: var(--deep); border: 1px solid var(--gunmetal);
    border-radius: var(--radius-card); padding: 12px 16px;
    min-width: 165px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
#map-legend h3 {
    font-size: 10px; color: var(--slate); text-transform: uppercase;
    letter-spacing: 0.7px; margin-bottom: 8px; font-weight: 500;
}
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 3px; color: var(--ash); }
.legend-line { width: 24px; height: 3px; border-radius: 2px; flex-shrink: 0; }
.legend-line.interdit { background: var(--blue); opacity: 0.85; }
.legend-line.partiel { background: var(--ash); }
.legend-line.autorise { background: var(--steel); }

/* ---- Autocomplete ---- */
.ac-dropdown {
    position: absolute; top: calc(100% + 2px); left: 0; right: 0; z-index: 9999;
    background: var(--deep); border: 1px solid var(--gunmetal);
    border-radius: var(--radius-input); max-height: 220px;
    overflow-y: auto; display: none;
}
.ac-item {
    padding: 10px 14px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid var(--void); color: var(--fog);
    transition: background 0.1s;
}
.ac-item:last-child { border-bottom: none; border-radius: 0 0 5px 5px; }
.ac-item:hover, .ac-item.active { background: var(--graphite); color: var(--white); }
.ac-item .ac-name { font-weight: 500; color: var(--white); }
.ac-item .ac-addr { font-size: 11px; color: var(--slate); margin-top: 1px; }

/* ---- Spinner ---- */
.spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.25); border-top-color: var(--white);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 4px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Mobile ---- */
@media (max-width: 768px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; min-width: unset; max-height: 45vh; }
    #map { height: 55vh; }
    #map::after { height: 80px; }
    #map-legend { bottom: 12px; right: 12px; padding: 8px 12px; min-width: 140px; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
    <div id="sidebar-header">
        <div class="logo-mark">🛵</div>
        <div>
            <h1>ScooterRoute</h1>
            <div class="subtitle">Itinéraires scooter &amp; voiture sans permis</div>
        </div>
    </div>

    <div id="route-form">
        <div class="vehicle-bar">
            <button class="vehicle-btn active" onclick="setVehicle('scooter')">🛵 50cc</button>
            <button class="vehicle-btn" onclick="setVehicle('voiturette')">🚗 Voiturette</button>
        </div>
        <div class="form-group">
            <label>Départ</label>
            <span class="input-icon">◉</span>
            <input type="text" id="from" placeholder="Adresse, lieu..." autocomplete="off" />
            <div class="ac-dropdown" id="ac-from"></div>
        </div>
        <div class="form-group">
            <label>Arrivée</label>
            <span class="input-icon">◎</span>
            <input type="text" id="to" placeholder="Adresse, lieu..." autocomplete="off" />
            <div class="ac-dropdown" id="ac-to"></div>
        </div>
        <button id="route-btn" onclick="calculateRoute()">Calculer l'itinéraire</button>
    </div>

    <div class="separator"></div>

    <div id="route-result">
        <div id="route-result-content">
            <div class="alert">
                Saisissez un départ et une arrivée pour obtenir un itinéraire compatible scooter / voiture sans permis.
            </div>
        </div>
    </div>
</div>

<!-- Map -->
<div id="map">
    <div id="map-legend">
        <h3>Restrictions</h3>
        <div class="legend-item"><div class="legend-line interdit"></div> Voie rapide · Interdit</div>
        <div class="legend-item"><div class="legend-line partiel"></div> Partiellement restreint</div>
        <div class="legend-item"><div class="legend-line autorise"></div> Autorisé</div>
    </div>
</div>

<script>
const API_URL = '';
const OSM_API = '/api/restrictions';
const NOMINATIM_URL = 'https://nominatim.openstreetmap.org/search';
const NICE_CENTER = [43.7102, 7.2620];
const NICE_BOUNDS = [[43.63, 7.12], [43.78, 7.40]];

let currentVehicle = 'scooter';
let restrictionOverlay = null;
let routeLine = null;
let markerStart = null;
let markerEnd = null;
let debounceTimer = null;

const map = L.map('map', { center: NICE_CENTER, zoom: 13, maxBounds: NICE_BOUNDS, maxBoundsViscosity: 1.0, zoomControl: false });
L.control.zoom({ position: 'bottomleft' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" style="color:#566171">OSM contributors</a>',
    maxZoom: 19
}).addTo(map);

// ---- Restriction overlay ----
async function loadRestrictions() {
    const b = map.getBounds();
    try {
        const resp = await fetch(`${OSM_API}?south=${b.getSouth()}&west=${b.getWest()}&north=${b.getNorth()}&east=${b.getEast()}`, {signal: AbortSignal.timeout(20000)});
        const data = await resp.json();
        renderRestrictions(data);
    } catch(e) { console.warn('OSM proxy:', e); }
}

function renderRestrictions(data) {
    if (restrictionOverlay) map.removeLayer(restrictionOverlay);
    const nodes = {};
    for (const el of data.elements || []) { if (el.type === 'node') nodes[el.id] = [el.lat, el.lon]; }
    const g = { interdit: [], interditGlow: [], partiel: [], autorise: [] };
    for (const el of data.elements || []) {
        if (el.type !== 'way' || !el.nodes) continue;
        const t = el.tags || {}; const h = t.highway || '';
        const latlngs = el.nodes.map(id => nodes[id]).filter(Boolean);
        if (latlngs.length < 2) continue;
        if (h === 'motorway' || h === 'motorway_link' || t.motorroad === 'yes') {
            g.interdit.push(latlngs); g.interditGlow.push(latlngs);
        } else if (h === 'trunk' || h === 'trunk_link') { g.partiel.push(latlngs); }
        else { g.autorise.push(latlngs); }
    }
    const layers = [];
    if (g.interditGlow.length) {
        layers.push(L.polyline(g.interditGlow, {color:'#007afc', weight:9, opacity:0.12, smoothFactor:0.5}));
        layers.push(L.polyline(g.interditGlow, {color:'#007afc', weight:5, opacity:0.25, smoothFactor:0.5}));
        layers.push(L.polyline(g.interdit, {color:'#007afc', weight:2.5, opacity:0.85, smoothFactor:0.5}));
    }
    if (g.partiel.length) {
        layers.push(L.polyline(g.partiel, {color:'#a0aaba', weight:2, opacity:0.35, dashArray:'6,4', smoothFactor:0.5}));
    }
    if (g.autorise.length) {
        layers.push(L.polyline(g.autorise, {color:'#566171', weight:1.2, opacity:0.2, smoothFactor:1}));
    }
    restrictionOverlay = L.layerGroup(layers).addTo(map);
}
map.on('moveend', () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadRestrictions, 400); });
map.on('zoomend', () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadRestrictions, 400); });

// ---- Geocoding ----
async function geocode(query) {
    if (!query || query.length < 3) return null;
    const key = query.toLowerCase().trim();
    if (window._gcCache && window._gcCache[key]) return window._gcCache[key];
    try {
        const resp = await fetch(`${NOMINATIM_URL}?format=json&q=${encodeURIComponent(query)}&limit=1&countrycodes=fr`, {headers: {'User-Agent': 'ScooterRoute/1.0'}});
        const data = await resp.json();
        if (data && data.length) {
            const coord = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
            if (!window._gcCache) window._gcCache = {};
            window._gcCache[key] = coord; return coord;
        }
    } catch(e) {} return null;
}

// ---- Autocomplete ----
function setupAutocomplete(inputId, dropdownId) {
    const input = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);
    let timer, selectedIdx = -1, results = [];
    input.addEventListener('input', () => {
        clearTimeout(timer);
        const q = input.value.trim();
        if (q.length < 2) { dropdown.style.display = 'none'; return; }
        timer = setTimeout(() => fetchSuggestions(q, input, dropdown), 250);
    });
    input.addEventListener('keydown', (e) => {
        if (dropdown.style.display !== 'block') return;
        if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, results.length - 1); highlightItem(dropdown, selectedIdx); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, 0); highlightItem(dropdown, selectedIdx); }
        else if ((e.key === 'Enter' || e.key === 'Tab') && selectedIdx >= 0) { e.preventDefault(); selectResult(results[selectedIdx], input, dropdown); }
        else selectedIdx = -1;
    });
    input.addEventListener('blur', () => setTimeout(() => { dropdown.style.display = 'none'; }, 200));
    input.addEventListener('focus', () => { if (results.length) dropdown.style.display = 'block'; });
}

async function fetchSuggestions(query, input, dropdown) {
    try {
        const resp = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5&lang=fr&lat=43.71&lon=7.26`);
        const data = await resp.json();
        results = (data.features || []).map(f => ({
            name: f.properties.name || '', street: f.properties.street || '',
            housenumber: f.properties.housenumber || '',
            city: f.properties.city || f.properties.locality || '',
            postcode: f.properties.postcode || '',
            lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0],
            label: [f.properties.housenumber, f.properties.street || f.properties.name, f.properties.city].filter(Boolean).join(', ') || f.properties.name || ''
        }));
        renderDropdown(results, dropdown, input); selectedIdx = -1;
    } catch(e) { dropdown.style.display = 'none'; }
}

function renderDropdown(items, dropdown, input) {
    if (!items.length) { dropdown.style.display = 'none'; return; }
    dropdown.innerHTML = items.map((r, i) =>
        `<div class="ac-item" data-idx="${i}" onmousedown="selectResult(results[${i}], document.getElementById('${input.id}'), document.getElementById('${dropdown.id}'))">
            <div class="ac-name">${esc(r.street || r.name || '?')}</div>
            <div class="ac-addr">${esc([r.housenumber, r.postcode, r.city].filter(Boolean).join(' '))}</div>
        </div>`
    ).join('');
    dropdown.style.display = 'block';
}

function selectResult(result, input, dropdown) {
    input.value = result.label || result.street || result.name;
    dropdown.style.display = 'none';
    input.dataset.lat = result.lat; input.dataset.lon = result.lon;
    const coord = [result.lat, result.lon];
    const isFrom = input.id === 'from';
    const mk = isFrom ? 'markerStart' : 'markerEnd';
    if (window[mk]) map.removeLayer(window[mk]);
    window[mk] = L.circleMarker(coord, {radius:7, color:isFrom?'#007afc':'#228a56', fillColor:isFrom?'#007afc':'#228a56', fillOpacity:1, weight:2}).addTo(map).bindPopup(isFrom?'Départ':'Arrivée');
    map.setView(coord, 14);
}
function highlightItem(dropdown, idx) { dropdown.querySelectorAll('.ac-item').forEach((el, i) => el.classList.toggle('active', i === idx)); }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

setupAutocomplete('from', 'ac-from');
setupAutocomplete('to', 'ac-to');

// ---- Routing ----
async function calculateRoute() {
    const f = document.getElementById('from').value.trim();
    const t = document.getElementById('to').value.trim();
    const btn = document.getElementById('route-btn');
    const res = document.getElementById('route-result-content');
    if (!f || !t) { res.innerHTML = '<div class="alert">Veuillez saisir un départ et une arrivée.</div>'; return; }
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Calcul…';
    try {
        const fc = await geocode(f + ', Nice, France');
        const tc = await geocode(t + ', Nice, France');
        if (!fc || !tc) { res.innerHTML = '<div class="alert">Adresse introuvable.</div>'; btn.disabled = false; btn.innerHTML = 'Calculer l\'itinéraire'; return; }
        if (markerStart) map.removeLayer(markerStart); if (markerEnd) map.removeLayer(markerEnd);
        if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
        markerStart = L.circleMarker(fc, {radius:7,color:'#007afc',fillColor:'#007afc',fillOpacity:1,weight:2}).addTo(map).bindPopup('Départ');
        markerEnd = L.circleMarker(tc, {radius:7,color:'#228a56',fillColor:'#228a56',fillOpacity:1,weight:2}).addTo(map).bindPopup('Arrivée');
        map.fitBounds([fc, tc], {padding: [40,40]});
        const resp = await fetch(`${API_URL}/api/route?from_lat=${fc[0]}&from_lon=${fc[1]}&to_lat=${tc[0]}&to_lon=${tc[1]}&profile=${currentVehicle}`, {signal:AbortSignal.timeout(10000)});
        const data = await resp.json();
        if (!data.found) { res.innerHTML = `<div class="alert">${data.error || 'Pas de route trouvée'}</div>`; btn.disabled = false; btn.innerHTML = 'Calculer l\'itinéraire'; return; }
        const coords = data.path.map(c => [c[1], c[0]]);
        routeLine = L.polyline(coords, {color:'#007afc', weight:4, opacity:0.85, smoothFactor:0.5}).addTo(map);
        const ms = data.max_speed_kmh || (currentVehicle === 'scooter' ? 45 : 70);
        res.innerHTML = `
            <div class="route-stats">
                <div class="route-stat"><div class="value blue">${data.distance_km} km</div><div class="label">Distance</div></div>
                <div class="route-stat"><div class="value green">${data.duration_min} min</div><div class="label">Durée</div></div>
            </div>
            <div class="route-detail">
                <span>${currentVehicle === 'scooter' ? '🛵 Scooter 50cc' : '🚗 Voiture sans permis'}</span>
                <span>⚡ ${ms} km/h max</span>
            </div>
            <div class="route-footer">
                <a href="https://github.com/DnzzL/scooter-routing" target="_blank">ScooterRoute</a> · Données OSM
            </div>`;
    } catch(e) { res.innerHTML = `<div class="alert">Erreur : ${e.message}</div>`; }
    btn.disabled = false; btn.innerHTML = 'Calculer l\'itinéraire';
}

function setVehicle(type) {
    currentVehicle = type;
    document.querySelectorAll('.vehicle-btn').forEach((b,i) => b.classList.toggle('active', (type==='scooter' && i===0) || (type==='voiturette' && i===1)));
}

loadRestrictions();
document.addEventListener('keydown', (e) => { if (e.key === 'Enter' && ['from','to'].includes(document.activeElement?.id)) calculateRoute(); });

// PWA service worker
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

// Attribution style
document.querySelectorAll('.leaflet-control-attribution').forEach(el => {
    el.style.cssText = 'background:rgba(14,16,18,0.85)!important;color:#566171!important;font-size:10px!important;padding:2px 8px!important;border-radius:4px 0 0 0!important;';
});
</script>
</body>
</html>
